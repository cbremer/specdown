name: SpecDown

options:
  bundleIdPrefix: com.cbremer
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  # Apple-recommended hardening (Xcode's "validate settings" prompt). Safe here:
  # there are no shell-script build phases for the sandbox to constrain. Setting
  # it in project.yml makes it persist across `xcodegen generate`.
  ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  SpecDown:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: SpecDown
      - path: ../markdown-viewer/dist
        type: folder
        buildPhase: resources

    # Bundle the shared web viewer's Vite build output as a folder reference
    # (blue folder). The dist/ directory is copied into the app bundle,
    # accessible at runtime as dist/index.html (and dist/samples/ for the
    # bundled sample documents). Run `npm run build` before generating/building
    # the Xcode project so dist/ exists.

    settings:
      PRODUCT_NAME: Specdown
      TARGETED_DEVICE_FAMILY: "1,2"   # 1 = iPhone, 2 = iPad

    info:
      path: SpecDown/Info.plist
      properties:
        CFBundleDisplayName: Specdown
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsInWebContent: true
