name: iOS Build

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "ios/**"
      - "markdown-viewer/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "scripts/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - "markdown-viewer/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "scripts/**"
      - ".github/workflows/ios.yml"

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project ios/SpecDown.xcodeproj \
            -scheme SpecDown \
            -sdk iphonesimulator \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Build (raw output on failure)
        if: failure()
        run: |
          xcodebuild \
            -project ios/SpecDown.xcodeproj \
            -scheme SpecDown \
            -sdk iphonesimulator \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
