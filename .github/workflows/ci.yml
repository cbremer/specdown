name: CI

# Lint + test gate for the shared viewer core. Previously tests ran only
# locally by convention; this lane makes them an enforced check on every PR
# and on pushes to the integration branches.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
