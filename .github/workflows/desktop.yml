name: Build Desktop App

on:
  # Tag pushes (e.g. from a PAT or GitHub App — GITHUB_TOKEN tag pushes
  # do NOT trigger this; the version-bump workflow uses workflow_dispatch
  # instead).
  push:
    tags:
      - 'v*'
  # Triggered explicitly by the version-bump "tag" job, or manually.
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # macOS: DMG
  # -------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    # Sign + notarize only when the signing secrets are configured; otherwise
    # fall back to an unsigned build so the pipeline never hard-fails (e.g. on a
    # fork or a quick manual dispatch). See docs/project-modernization for setup.
    env:
      HAS_SIGNING: ${{ secrets.MAC_CERT_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # Signed + notarized build (Developer ID). electron-builder imports the
      # cert from CSC_LINK/CSC_KEY_PASSWORD; `-c.mac.notarize=true` enables
      # notarization via notarytool, which reads the APPLE_ID app-specific
      # password and APPLE_TEAM_ID from the env below.
      - name: Build DMG (signed + notarized)
        if: env.HAS_SIGNING == 'true'
        run: npm run desktop:build -- --mac dmg --universal -c.mac.notarize=true
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Unsigned fallback (no secrets configured). Produces a working DMG that
      # macOS Gatekeeper will quarantine ("damaged") — the signed path above is
      # the real distribution build.
      - name: Build DMG (unsigned fallback)
        if: env.HAS_SIGNING != 'true'
        run: npm run desktop:build -- --mac dmg --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.dmg

  # -------------------------------------------------------
  # Windows: NSIS installer (.exe)
  # -------------------------------------------------------
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run desktop:build -- --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.exe

  # -------------------------------------------------------
  # Linux: AppImage
  # -------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm-dev libxkbcommon-dev libgbm-dev

      - name: Build AppImage
        run: npm run desktop:build -- --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: dist/*.AppImage
