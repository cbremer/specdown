name: Build Desktop App

on:
  # Tag pushes (e.g. from a PAT or GitHub App — GITHUB_TOKEN tag pushes
  # do NOT trigger this; the version-bump workflow uses workflow_dispatch
  # instead).
  push:
    tags:
      - 'v*'
  # Triggered explicitly by the version-bump "tag" job, or manually.
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # macOS: DMG
  # -------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
      issues: write # failure step files/refreshes the macos-release-failure issue
    # Sign + notarize only when the signing secrets are configured; otherwise
    # fall back to an unsigned build so the pipeline never hard-fails (e.g. on a
    # fork or a quick manual dispatch). See docs/project-modernization for setup.
    env:
      HAS_SIGNING: ${{ secrets.MAC_CERT_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # Signed + notarized build (Developer ID). electron-builder imports the
      # cert from CSC_LINK/CSC_KEY_PASSWORD; `-c.mac.notarize=true` enables
      # notarization via notarytool, which reads the APPLE_ID app-specific
      # password and APPLE_TEAM_ID from the env below.
      - name: Build DMG (signed + notarized)
        if: env.HAS_SIGNING == 'true'
        # `zip` is built alongside `dmg` because electron-updater downloads the
        # zip (not the dmg) for macOS auto-updates. `--publish never` keeps
        # electron-builder from uploading: it still generates the latest-mac.yml
        # update feed locally, and the softprops step below uploads everything.
        run: npm run desktop:build -- --mac dmg zip --universal -c.mac.notarize=true --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Unsigned fallback (no secrets configured). Produces a working DMG that
      # macOS Gatekeeper will quarantine ("damaged") — the signed path above is
      # the real distribution build.
      - name: Build DMG (unsigned fallback)
        if: env.HAS_SIGNING != 'true'
        run: npm run desktop:build -- --mac dmg zip --universal --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the installer (dmg), the auto-update artifact (zip), their
      # blockmaps, and the latest-mac.yml update feed so electron-updater can
      # discover and download new versions.
      - name: Upload macOS artifacts to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

      # Loud failure: when this lane breaks, macOS users silently lose both
      # the DMG and the latest-mac.yml update feed while Win/Linux keep
      # publishing (exactly how the 2026-07 Apple-agreement expiry went
      # unnoticed for three releases). File/refresh a labeled issue so the
      # outage is visible without anyone reading Actions logs.
      - name: Open an issue if the macOS release build failed
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const tag = '${{ steps.get_tag.outputs.tag }}' || 'unknown tag';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'macos-release-failure';
            const title = 'macOS release build is failing';
            const body = [
              `The **Build macOS DMG** job failed for **${tag}**.`,
              '',
              `Run: ${runUrl}`,
              '',
              'Until this is fixed, releases publish WITHOUT a DMG or',
              '`latest-mac.yml`, so macOS auto-update checks fail with a 404.',
              '',
              'Common cause: Apple 403 "required agreement … expired" — the',
              'account holder must accept the updated agreement at',
              'developer.apple.com, then re-run the failed job.',
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch {
              await github.rest.issues.createLabel({ ...context.repo, name: label, color: 'B60205' });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label, per_page: 1,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open.data[0].number,
                body: `Still failing for **${tag}** — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo, title, body, labels: [label],
              });
            }

  # -------------------------------------------------------
  # Windows: NSIS installer (.exe)
  # -------------------------------------------------------
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run desktop:build -- --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the NSIS installer, its blockmap, and the latest.yml update feed
      # for electron-updater on Windows.
      - name: Upload Windows artifacts to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  # -------------------------------------------------------
  # Linux: AppImage
  # -------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3-dev libatk-bridge2.0-dev libdrm-dev libxkbcommon-dev libgbm-dev

      - name: Build AppImage
        run: npm run desktop:build -- --linux AppImage --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the AppImage and the latest-linux.yml update feed for
      # electron-updater on Linux.
      - name: Upload Linux artifacts to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
